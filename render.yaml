services:
  - type: web
    name: ai-multimedia-qa-backend
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python startup_check.py && uvicorn main:app --host 0.0.0.0 --port ${PORT:-10000}
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
