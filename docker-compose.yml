version: '3.9'

services:
  mongodb:
    image: mongo:7.0
    container_name: ai_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - ai_network

  redis:
    image: redis:7.2-alpine
    container_name: ai_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - ai_network

  backend:
    build: ./backend
    container_name: ai_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend/storage:/app/storage
      - ./backend/faiss_indexes:/app/faiss_indexes
    networks:
      - ai_network

  frontend:
    image: node:20-alpine
    container_name: ai_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    networks:
      - ai_network

volumes:
  mongo_data:

networks:
  ai_network:
    driver: bridge
